{% extends "layouts/base.html" %}

{% block body %}

    <header>
        <h1>Registro de passageiro</h1>
    </header>

    {% if usr %}
        <p>
            Você está conectado com {{ usr.email }}
        </p>

    {% else %}
        <main>
            <h2>Insira suas credencias para efetuar o cadastro</h2>

            <form action="/registro/passageiro" method="post">
                <section>
                    <h3>Dados pessoais</h3>

                    <div>
                        <label for="nome">Nome completo</label>
                        <input id="nome" name="nome" type="text" value="{{ data.nome or '' }}" required>
                    </div>

                     <div>
                        <label for="data_nascimento">Data de nascimento</label>
                        <input id="data_nascimento" name="data_nascimento" type="date">
                    </div>

                    <div>
                        <!-- JS para tentar forçar o formato do CPF -->
                        <label for="cpf">CPF</label>
                        <input id="cpf" name="cpf" type="text"
                            placeholder="000.000.000-00"
                            maxlength="14"
                            oninput="formatCPF(this)"
                        required>
                    </div>

                    <div>
                        <label for="passaporte">Código Passaporte</label>
                        <input id="passaporte" name="passaporte" type="text" required>
                    </div>

                    <div>
                        <label for="tipo_passaporte">Tipo do Passaporte</label>
                        <select id="tipo_passaporte" name="tipo_passaporte" required>
                        <option value="" disabled selected>Selecione o Tipo do Passaporte</option>

                        {% for key, value in tipo_passaporte.items() %}
                            <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                        </select>
                    </div>
                </section>

                <section>
                    <h3>Dados de Login</h3>

                    <div>
                        <label for="email">Insira seu e-mail</label>
                        <input id="email" name="email" type="email" required>
                    </div>

                    <div>
                        <label for="senha">Crie uma senha</label>
                        <input id="senha" name="senha" type="password" required>
                    </div>
                </section>

                <section>
                    <button type="submit">Cadastrar-se</button>
                </section>
            </form>
        </main>
    {% endif %}

    {% block footer %}
        <!-- Alguma msg sobre LGPD-->
    {% endblock footer %}

    <script src="{{ url_for('static', path='scripts/format-cpf.js') }}"></script>
{% endblock body %}
