<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>
            {% if title %}
                Hikorime - {{ title }}
            {% else %}
                Hikorime
            {% endif %}
        </title>
        {% block head %}
        {% endblock head %}
    </head>

    <body>
        {% block body %}
        {% endblock body %}

        {% if msg %}
        <script>
            alert("{{ msg }}");
        </script>
        {% endif %}

        {% if err %}
        <script>
            alert("{{ err }}");
        </script>
        {% endif %}
    </body>
</html>
